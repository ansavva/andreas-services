name: Deploy – Storybook Code

on:
  push:
    branches: [main]
    paths:
      - 'storybook/backend/**'
      - 'storybook/frontend/**'
      - '.github/workflows/deploy-storybook.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'storybook/backend/**'
            frontend:
              - 'storybook/frontend/**'

  # ---------------------------------------------------------------------------
  # Build Docker image, push to ECR, update both Lambda functions + env vars
  # ECR URLs and Lambda names come from vars set by deploy-infra-storybook.yml
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Build & Deploy Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: storybook-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd storybook/backend
          DOCKER_BUILDKIT=0 docker build \
            -t "${{ vars.ECR_REPOSITORY_URL }}:${IMAGE_TAG}" \
            -t "${{ vars.ECR_REPOSITORY_URL }}:latest" \
            -t "${{ vars.IMAGE_WORKER_ECR_REPOSITORY_URL }}:${IMAGE_TAG}" \
            -t "${{ vars.IMAGE_WORKER_ECR_REPOSITORY_URL }}:latest" \
            .

      - name: Push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "${{ vars.ECR_REPOSITORY_URL }}:${IMAGE_TAG}"
          docker push "${{ vars.ECR_REPOSITORY_URL }}:latest"
          docker push "${{ vars.IMAGE_WORKER_ECR_REPOSITORY_URL }}:${IMAGE_TAG}"
          docker push "${{ vars.IMAGE_WORKER_ECR_REPOSITORY_URL }}:latest"

      - name: Update API Lambda env vars
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          STABILITY_API_KEY:        ${{ secrets.STABILITY_API_KEY }}
          REPLICATE_API_TOKEN:      ${{ secrets.REPLICATE_API_TOKEN }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          DATABASE_NAME:            ${{ vars.DATABASE_NAME }}
          AWS_COGNITO_USER_POOL_ID: ${{ vars.AWS_COGNITO_USER_POOL_ID }}
          AWS_COGNITO_APP_CLIENT_ID:${{ vars.AWS_COGNITO_APP_CLIENT_ID }}
          S3_BUCKET_NAME:           ${{ vars.S3_BACKEND_BUCKET_NAME }}
          APP_URL:                  ${{ vars.APP_URL }}
          IMAGE_UPLOAD_QUEUE_URL:   ${{ vars.IMAGE_UPLOAD_QUEUE_URL }}
        run: |
          set -euo pipefail
          KEYS=(OPENAI_API_KEY STABILITY_API_KEY REPLICATE_API_TOKEN DATABASE_URL \
                DATABASE_NAME AWS_COGNITO_USER_POOL_ID AWS_COGNITO_APP_CLIENT_ID \
                S3_BUCKET_NAME APP_URL IMAGE_UPLOAD_QUEUE_URL)
          ENV_JSON=$(jq -n 'reduce $ARGS.positional[] as $p ({}; .[$p | split("=")[0]] = ($p | split("=")[1:] | join("=")))' \
            --args "${KEYS[@]/#/}" 2>/dev/null || echo "{}")

          # Build env JSON from shell env vars directly
          ENV_OBJ="{}"
          for KEY in "${KEYS[@]}"; do
            VAL="${!KEY:-}"
            [ -n "$VAL" ] && ENV_OBJ=$(echo "$ENV_OBJ" | jq -c --arg k "$KEY" --arg v "$VAL" '.[$k]=$v')
          done
          jq -n --argjson v "$ENV_OBJ" '{Variables:$v}' > /tmp/env-api.json

          aws lambda update-function-configuration \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --environment file:///tmp/env-api.json

      - name: Update image worker Lambda env vars
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          STABILITY_API_KEY:        ${{ secrets.STABILITY_API_KEY }}
          REPLICATE_API_TOKEN:      ${{ secrets.REPLICATE_API_TOKEN }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          DATABASE_NAME:            ${{ vars.DATABASE_NAME }}
          AWS_COGNITO_USER_POOL_ID: ${{ vars.AWS_COGNITO_USER_POOL_ID }}
          AWS_COGNITO_APP_CLIENT_ID:${{ vars.AWS_COGNITO_APP_CLIENT_ID }}
          S3_BUCKET_NAME:           ${{ vars.S3_BACKEND_BUCKET_NAME }}
          APP_URL:                  ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          KEYS=(OPENAI_API_KEY STABILITY_API_KEY REPLICATE_API_TOKEN DATABASE_URL \
                DATABASE_NAME AWS_COGNITO_USER_POOL_ID AWS_COGNITO_APP_CLIENT_ID \
                S3_BUCKET_NAME APP_URL)
          ENV_OBJ="{}"
          for KEY in "${KEYS[@]}"; do
            VAL="${!KEY:-}"
            [ -n "$VAL" ] && ENV_OBJ=$(echo "$ENV_OBJ" | jq -c --arg k "$KEY" --arg v "$VAL" '.[$k]=$v')
          done
          jq -n --argjson v "$ENV_OBJ" '{Variables:$v}' > /tmp/env-worker.json

          aws lambda update-function-configuration \
            --function-name "${{ vars.IMAGE_WORKER_LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --environment file:///tmp/env-worker.json

      - name: Wait for configuration updates
        run: |
          aws lambda wait function-updated \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}"
          aws lambda wait function-updated \
            --function-name "${{ vars.IMAGE_WORKER_LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Update Lambda function code
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --image-uri "${{ vars.ECR_REPOSITORY_URL }}:${IMAGE_TAG}" \
            --region "${{ env.AWS_REGION }}" \
            --output table --query '{FunctionName:FunctionName,CodeSize:CodeSize}'

          aws lambda update-function-code \
            --function-name "${{ vars.IMAGE_WORKER_LAMBDA_FUNCTION_NAME }}" \
            --image-uri "${{ vars.IMAGE_WORKER_ECR_REPOSITORY_URL }}:${IMAGE_TAG}" \
            --region "${{ env.AWS_REGION }}" \
            --output table --query '{FunctionName:FunctionName,CodeSize:CodeSize}'

  # ---------------------------------------------------------------------------
  # Build Vite SPA and sync to S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: storybook-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: storybook/frontend/storybook-ui/package-lock.json

      - name: Install dependencies
        run: cd storybook/frontend/storybook-ui && npm install --legacy-peer-deps

      - name: Build frontend
        env:
          VITE_API_URL:                  ${{ vars.VITE_API_URL }}
          VITE_AWS_COGNITO_USER_POOL_ID: ${{ vars.VITE_AWS_COGNITO_USER_POOL_ID }}
          VITE_AWS_COGNITO_APP_CLIENT_ID:${{ vars.VITE_AWS_COGNITO_APP_CLIENT_ID }}
          VITE_AWS_COGNITO_DOMAIN:       ${{ vars.VITE_AWS_COGNITO_DOMAIN }}
        run: cd storybook/frontend/storybook-ui && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync storybook/frontend/storybook-ui/dist/ "s3://${{ vars.S3_BUCKET_NAME }}/app/" \
            --region "${{ env.AWS_REGION }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

      - name: Sync HTML (no cache)
        run: |
          aws s3 sync storybook/frontend/storybook-ui/dist/ "s3://${{ vars.S3_BUCKET_NAME }}/app/" \
            --region "${{ env.AWS_REGION }}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
