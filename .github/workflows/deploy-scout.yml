name: Deploy – Scout Code

on:
  push:
    branches: [main]
    paths:
      - 'scout/lambda/**'
      - 'scout/frontend/**'
      - '.github/workflows/deploy-scout.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: scout

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'scout/lambda/**'
            frontend:
              - 'scout/frontend/**'

  # ---------------------------------------------------------------------------
  # Package Lambda zips and push to the functions
  # Infrastructure (CloudFormation) is managed by deploy-infra-scout.yml
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Lambda Functions
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: scout-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package email-processor Lambda
        run: |
          cd scout/lambda/email-processor
          pip install -q -r requirements.txt -t package/
          cp lambda_function.py package/
          cd package && zip -q -r ../email-processor.zip .

      - name: Package events-api Lambda
        run: |
          cd scout/lambda/events-api
          mkdir -p package
          cp lambda_function.py package/
          cd package && zip -q -r ../events-api.zip .

      - name: Upload Lambda packages to S3
        run: |
          aws s3 cp scout/lambda/email-processor.zip \
            "s3://${{ vars.LAMBDA_CODE_BUCKET }}/lambda/email-processor.zip"
          aws s3 cp scout/lambda/events-api.zip \
            "s3://${{ vars.LAMBDA_CODE_BUCKET }}/lambda/events-api.zip"

      - name: Update Lambda function code
        run: |
          for fn in email-processor events-api; do
            aws lambda update-function-code \
              --function-name "${{ env.STACK_NAME }}-${fn}" \
              --s3-bucket "${{ vars.LAMBDA_CODE_BUCKET }}" \
              --s3-key "lambda/${fn}.zip" \
              --region "${{ env.AWS_REGION }}" \
              --output table \
              --query '{FunctionName:FunctionName,CodeSize:CodeSize}'
          done

  # ---------------------------------------------------------------------------
  # Build Vite SPA and sync to S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: scout-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: scout/frontend/package-lock.json

      - name: Install dependencies
        run: cd scout/frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: cd scout/frontend && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync scout/frontend/dist/ "s3://${{ vars.S3_BUCKET_NAME }}/" \
            --region "${{ env.AWS_REGION }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

      - name: Sync HTML (no cache)
        run: |
          aws s3 sync scout/frontend/dist/ "s3://${{ vars.S3_BUCKET_NAME }}/" \
            --region "${{ env.AWS_REGION }}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
