name: Deploy – Storybook Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'storybook/terraform/**'
      - '.github/workflows/deploy-infra-storybook.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_DIR: storybook/terraform/envs/prod

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: storybook-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "cognito_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(terraform output -raw cognito_domain)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "app_url=$(terraform output -raw application_url)" >> "$GITHUB_OUTPUT"
          echo "s3_frontend=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "s3_backend=$(terraform output -raw s3_backend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "image_queue_url=$(terraform output -raw image_queue_url)" >> "$GITHUB_OUTPUT"
          echo "lambda_name=$(terraform output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"
          echo "image_worker_name=$(terraform output -raw image_worker_lambda_function_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "image_worker_ecr_url=$(terraform output -raw image_worker_ecr_repository_url)" >> "$GITHUB_OUTPUT"

      # Writes all infrastructure values into the storybook-production environment
      # so the code deploy workflow can read them without knowing Terraform details.
      - name: Update storybook-production GitHub variables
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const vars = {
              AWS_COGNITO_USER_POOL_ID:           '${{ steps.tf.outputs.cognito_pool_id }}',
              AWS_COGNITO_APP_CLIENT_ID:           '${{ steps.tf.outputs.cognito_client_id }}',
              VITE_AWS_COGNITO_USER_POOL_ID:       '${{ steps.tf.outputs.cognito_pool_id }}',
              VITE_AWS_COGNITO_APP_CLIENT_ID:      '${{ steps.tf.outputs.cognito_client_id }}',
              VITE_AWS_COGNITO_DOMAIN:             '${{ steps.tf.outputs.cognito_domain }}',
              VITE_API_URL:                        '${{ steps.tf.outputs.api_url }}',
              APP_URL:                             '${{ steps.tf.outputs.app_url }}',
              S3_BUCKET_NAME:                      '${{ steps.tf.outputs.s3_frontend }}',
              S3_BACKEND_BUCKET_NAME:              '${{ steps.tf.outputs.s3_backend }}',
              CLOUDFRONT_DISTRIBUTION_ID:          '${{ steps.tf.outputs.cf_dist_id }}',
              IMAGE_UPLOAD_QUEUE_URL:              '${{ steps.tf.outputs.image_queue_url }}',
              LAMBDA_FUNCTION_NAME:                '${{ steps.tf.outputs.lambda_name }}',
              IMAGE_WORKER_LAMBDA_FUNCTION_NAME:   '${{ steps.tf.outputs.image_worker_name }}',
              ECR_REPOSITORY_URL:                  '${{ steps.tf.outputs.ecr_url }}',
              IMAGE_WORKER_ECR_REPOSITORY_URL:     '${{ steps.tf.outputs.image_worker_ecr_url }}',
            };
            for (const [name, value] of Object.entries(vars)) {
              const base = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: 'storybook-production',
                name,
                value,
              };
              try {
                await github.rest.actions.updateEnvironmentVariable(base);
              } catch {
                await github.rest.actions.createEnvironmentVariable(base);
              }
              core.info(`Set ${name} = ${value}`);
            }
