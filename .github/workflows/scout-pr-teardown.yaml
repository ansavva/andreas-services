name: Scout · Tear down preview · PR closed

on:
  pull_request:
    types:
      - closed

concurrency:
  group: scout-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  LAMBDA_CODE_BUCKET: andreas-services-lambda-code

jobs:
  # ---------------------------------------------------------------------------
  # Delete the Scout ephemeral stack when a PR closes (merged or abandoned).
  # Runs for every PR close; the check-stack step short-circuits if there is
  # no scout-pr stack for this PR number.
  # ---------------------------------------------------------------------------
  teardown-scout:
    name: Teardown Scout PR Stack
    runs-on: ubuntu-latest
    environment: scout-pr
    permissions:
      id-token: write
      contents: read
    env:
      STACK_NAME: scout-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if stack exists
        id: check-stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Delete CloudFormation stack
        if: steps.check-stack.outputs.status != 'DOES_NOT_EXIST'
        run: |
          aws cloudformation delete-stack \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-delete-complete \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}"

          echo "Stack ${{ env.STACK_NAME }} deleted successfully."

      - name: Clean up S3 Lambda artifacts
        if: steps.check-stack.outputs.status != 'DOES_NOT_EXIST'
        run: |
          aws s3 rm \
            "s3://${{ env.LAMBDA_CODE_BUCKET }}/pr/${{ github.event.pull_request.number }}/" \
            --recursive || true

      - name: Delete PR frontend from shared preview bucket
        run: |
          PR_PREVIEW_BUCKET=$(aws ssm get-parameter \
            --name /scout/pr-preview/s3-bucket \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -n "${PR_PREVIEW_BUCKET}" ]; then
            aws s3 rm "s3://${PR_PREVIEW_BUCKET}/${{ github.event.pull_request.number }}/" \
              --recursive || true
          fi

      - name: Invalidate CloudFront PR prefix
        run: |
          PR_PREVIEW_CF_DIST=$(aws ssm get-parameter \
            --name /scout/pr-preview/cf-dist-id \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -n "${PR_PREVIEW_CF_DIST}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${PR_PREVIEW_CF_DIST}" \
              --paths "/${{ github.event.pull_request.number }}/*"
          fi

      - name: Skip (stack not found)
        if: steps.check-stack.outputs.status == 'DOES_NOT_EXIST'
        run: echo "No Scout PR stack found for PR #${{ github.event.pull_request.number }} — nothing to delete."
