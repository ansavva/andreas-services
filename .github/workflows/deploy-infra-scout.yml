name: Deploy – Scout Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'scout/cloudformation.yaml'
      - 'scout/cloudformation-pr-preview.yaml'
      - '.github/workflows/deploy-infra-scout.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LAMBDA_CODE_BUCKET: andreas-services-lambda-code

jobs:
  # ---------------------------------------------------------------------------
  # Production stack (scout) — Lambdas, API GW @ scout-api.andreas.services,
  # CloudFront @ scout.andreas.services, DynamoDB, Route53.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy prod stack (scout)
    runs-on: ubuntu-latest
    environment: scout-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve shared infrastructure
        id: shared
        run: |
          ACM_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='*.andreas.services'].CertificateArn | [0]" \
            --output text)
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='andreas.services.'].Id | [0]" \
            --output text | sed 's|/hostedzone/||')
          echo "acm_arn=${ACM_ARN}" >> "$GITHUB_OUTPUT"
          echo "zone_id=${ZONE_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file scout/cloudformation.yaml \
            --stack-name scout \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "ProjectName=scout" \
              "LambdaCodeBucket=${{ env.LAMBDA_CODE_BUCKET }}" \
              "AcmCertificateArn=${{ steps.shared.outputs.acm_arn }}" \
              "Route53HostedZoneId=${{ steps.shared.outputs.zone_id }}" \
              "AnthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }}" \
              "GmailClientId=${{ secrets.GMAIL_CLIENT_ID }}" \
              "GmailClientSecret=${{ secrets.GMAIL_CLIENT_SECRET }}" \
              "GmailAccessToken=${{ secrets.GMAIL_ACCESS_TOKEN }}" \
              "GmailRefreshToken=${{ secrets.GMAIL_REFRESH_TOKEN }}"

      - name: Store infrastructure outputs in SSM
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name scout \
              --query "Stacks[0].Outputs[?OutputKey=='${1}'].OutputValue | [0]" \
              --output text
          }

          aws ssm put-parameter --overwrite --type String \
            --name /scout/prod/api-url \
            --value "$(get_output ApiEndpoint)"

          aws ssm put-parameter --overwrite --type String \
            --name /scout/prod/s3-bucket \
            --value "$(get_output S3BucketName)"

          aws ssm put-parameter --overwrite --type String \
            --name /scout/prod/cf-dist-id \
            --value "$(get_output CloudFrontDistributionId)"

  # ---------------------------------------------------------------------------
  # Shared PR-preview stack (scout-pr-preview) — one S3 bucket + CloudFront
  # for all PR frontends, one API GW custom domain (scout-api-pr) that each
  # PR's API attaches to via BasePathMapping.
  #
  # Independent of deploy-prod so PR previews can be stood up even if prod
  # secrets aren't configured yet.
  # ---------------------------------------------------------------------------
  deploy-pr-preview:
    name: Deploy PR preview shared stack (scout-pr-preview)
    runs-on: ubuntu-latest
    environment: scout-production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve shared infrastructure
        id: shared
        run: |
          ACM_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='*.andreas.services'].CertificateArn | [0]" \
            --output text)
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='andreas.services.'].Id | [0]" \
            --output text | sed 's|/hostedzone/||')
          echo "acm_arn=${ACM_ARN}" >> "$GITHUB_OUTPUT"
          echo "zone_id=${ZONE_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview infrastructure
        run: |
          aws cloudformation deploy \
            --template-file scout/cloudformation-pr-preview.yaml \
            --stack-name scout-pr-preview \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AcmCertificateArn=${{ steps.shared.outputs.acm_arn }}" \
              "Route53HostedZoneId=${{ steps.shared.outputs.zone_id }}"

      - name: Store PR preview infrastructure outputs in SSM
        run: |
          get_pr() {
            aws cloudformation describe-stacks \
              --stack-name scout-pr-preview \
              --query "Stacks[0].Outputs[?OutputKey=='${1}'].OutputValue | [0]" \
              --output text
          }

          aws ssm put-parameter --overwrite --type String \
            --name /scout/pr-preview/s3-bucket \
            --value "$(get_pr S3BucketName)"

          aws ssm put-parameter --overwrite --type String \
            --name /scout/pr-preview/cf-dist-id \
            --value "$(get_pr CloudFrontDistributionId)"

          aws ssm put-parameter --overwrite --type String \
            --name /scout/pr-preview/api-domain \
            --value "$(get_pr ApiDomainName)"
