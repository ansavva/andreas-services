AWSTemplateFormatVersion: '2010-09-09'
Description: Humbugg backend — ECR repository, Cognito, Lambda, API Gateway, DynamoDB

Parameters:
  FunctionName:
    Type: String
    Default: humbugg-backend-production
  ImageUri:
    Type: String
    # Placeholder used only on first stack creation; deploy workflow updates the image thereafter.
    Default: public.ecr.aws/lambda/python:3.11
  Timeout:
    Type: Number
    Default: 30
  MemorySize:
    Type: Number
    Default: 512
  EnvCorsOrigin:
    Type: String
    Default: https://humbugg.andreas.services
  StageName:
    Type: String
    Default: prod

Resources:

  # ---------------------------------------------------------------------------
  # ECR
  # ---------------------------------------------------------------------------

  HumbuggBackendECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: humbugg-backend-production
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # ---------------------------------------------------------------------------
  # Cognito
  # ---------------------------------------------------------------------------

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: humbugg-production
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      PasswordPolicy:
        MinimumLength: 8
        RequireUppercase: true
        RequireLowercase: true
        RequireNumbers: true
        RequireSymbols: false
      Schema:
        - Name: given_name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: family_name
          AttributeDataType: String
          Mutable: true
          Required: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: humbugg-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ---------------------------------------------------------------------------
  # DynamoDB
  # ---------------------------------------------------------------------------

  HumbuggProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-profiles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  HumbuggGroupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-groups
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: group_id
          AttributeType: S
      KeySchema:
        - AttributeName: group_id
          KeyType: HASH

  HumbuggGroupmembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-groupmembers
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: group_id
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: group_id-index
          KeySchema:
            - AttributeName: group_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ---------------------------------------------------------------------------
  # IAM
  # ---------------------------------------------------------------------------

  BackendLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${FunctionName}-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BackendLambdaDynamoPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${FunctionName}-dynamo-policy
      Roles:
        - !Ref BackendLambdaRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchWriteItem
              - dynamodb:BatchGetItem
            Resource:
              - !GetAtt HumbuggProfilesTable.Arn
              - !GetAtt HumbuggGroupsTable.Arn
              - !GetAtt HumbuggGroupmembersTable.Arn
              - !Sub ${HumbuggProfilesTable.Arn}/index/*
              - !Sub ${HumbuggGroupsTable.Arn}/index/*
              - !Sub ${HumbuggGroupmembersTable.Arn}/index/*

  # ---------------------------------------------------------------------------
  # Lambda
  # ---------------------------------------------------------------------------

  BackendFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Timeout: !Ref Timeout
      MemorySize: !Ref MemorySize
      Environment:
        Variables:
          HUMBUGG_PROFILES_TABLE: !Ref HumbuggProfilesTable
          HUMBUGG_GROUPS_TABLE: !Ref HumbuggGroupsTable
          HUMBUGG_GROUPMEMBERS_TABLE: !Ref HumbuggGroupmembersTable
          CORS_ORIGIN: !Ref EnvCorsOrigin
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
      Role: !GetAtt BackendLambdaRole.Arn

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${FunctionName}-http
      ProtocolType: HTTP

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BackendFunction.Arn
      PayloadFormatVersion: '2.0'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref StageName
      AutoDeploy: true
      DefaultRouteSettings:
        DetailedMetricsEnabled: true

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Join ['', ['integrations/', !Ref ApiIntegration]]

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

Outputs:
  LambdaFunctionName:
    Value: !Ref BackendFunction
  EcrRepositoryUri:
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${HumbuggBackendECR}
  ApiInvokeUrl:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
  ProfilesTableName:
    Value: !Ref HumbuggProfilesTable
  GroupsTableName:
    Value: !Ref HumbuggGroupsTable
  GroupmembersTableName:
    Value: !Ref HumbuggGroupmembersTable
