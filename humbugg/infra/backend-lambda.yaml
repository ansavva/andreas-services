AWSTemplateFormatVersion: '2010-09-09'
Description: Humbugg backend (Flask) Lambda deployment

Parameters:
  FunctionName:
    Type: String
  ImageUri:
    Type: String
    Description: ECR image URI (backend container built for linux/amd64)
  Timeout:
    Type: Number
    Default: 30
  MemorySize:
    Type: Number
    Default: 512
  EnvCorsOrigin:
    Type: String
    Default: https://www.example.com
  EnvCognitoRegion:
    Type: String
  EnvCognitoPoolId:
    Type: String
  EnvCognitoClientId:
    Type: String
  StageName:
    Type: String
    Default: prod

Resources:
  HumbuggProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-profiles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  HumbuggGroupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-groups
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: group_id
          AttributeType: S
      KeySchema:
        - AttributeName: group_id
          KeyType: HASH

  HumbuggGroupmembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: humbugg-groupmembers
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: group_id
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: group_id-index
          KeySchema:
            - AttributeName: group_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  BackendLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${FunctionName}-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BackendLambdaDynamoPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${FunctionName}-dynamo-policy
      Roles:
        - !Ref BackendLambdaRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchWriteItem
              - dynamodb:BatchGetItem
            Resource:
              - !GetAtt HumbuggProfilesTable.Arn
              - !GetAtt HumbuggGroupsTable.Arn
              - !GetAtt HumbuggGroupmembersTable.Arn
              - !Sub ${HumbuggProfilesTable.Arn}/index/*
              - !Sub ${HumbuggGroupsTable.Arn}/index/*
              - !Sub ${HumbuggGroupmembersTable.Arn}/index/*

  BackendFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Timeout: !Ref Timeout
      MemorySize: !Ref MemorySize
      Environment:
        Variables:
          HUMBUGG_PROFILES_TABLE: !Ref HumbuggProfilesTable
          HUMBUGG_GROUPS_TABLE: !Ref HumbuggGroupsTable
          HUMBUGG_GROUPMEMBERS_TABLE: !Ref HumbuggGroupmembersTable
          CORS_ORIGIN: !Ref EnvCorsOrigin
          COGNITO_REGION: !Ref EnvCognitoRegion
          COGNITO_USER_POOL_ID: !Ref EnvCognitoPoolId
          COGNITO_CLIENT_ID: !Ref EnvCognitoClientId
      Role:
        Fn::GetAtt:
          - BackendLambdaRole
          - Arn

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${FunctionName}-http
      ProtocolType: HTTP

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BackendFunction.Arn
      PayloadFormatVersion: 2.0

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref StageName
      AutoDeploy: true
      DefaultRouteSettings:
        DetailedMetricsEnabled: true

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Join ['', ['integrations/', !Ref ApiIntegration]]

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt BackendFunction.Arn
  ApiInvokeUrl:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  ProfilesTableName:
    Value: !Ref HumbuggProfilesTable
  GroupsTableName:
    Value: !Ref HumbuggGroupsTable
  GroupmembersTableName:
    Value: !Ref HumbuggGroupmembersTable
